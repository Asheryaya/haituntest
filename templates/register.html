<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 海豚计划四期人才测评系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="card">
            <div class="auth-header">
                <h1>🐬 海豚计划四期</h1>
                <p>人才测评系统 - 用户注册</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash-message flash-{{ category }}" style="position: static; margin-bottom: 1rem;">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('register') }}">
                <div class="form-group">
                    <label for="username">用户名 *</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="name">姓名 *</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="请输入真实姓名" required>
                </div>
                <div class="form-group">
                    <label for="department">部门</label>
                    <input type="text" id="department" name="department" class="form-control" placeholder="请输入所在部门">
                </div>
                <div class="form-group">
                    <label for="password">密码 *</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="请输入密码" required>
                </div>
                <div class="form-group">
                    <label for="password2">确认密码 *</label>
                    <input type="password" id="password2" name="password2" class="form-control" placeholder="请再次输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">注册</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <p>已有账户？<a href="{{ url_for('login') }}" style="color: var(--primary-color);">立即登录</a></p>
            </div>
        </div>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            var password = document.getElementById('password').value;
            var password2 = document.getElementById('password2').value;
            if (password !== password2) {
                e.preventDefault();
                alert('两次输入的密码不一致！');
            }
        });
    </script>
</body>
</html>
