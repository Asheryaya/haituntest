<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 海豚计划四期人才测评系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="card">
            <div class="auth-header">
                <h1>🐬 海豚计划四期</h1>
                <p>人才测评系统</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash-message flash-{{ category }}" style="position: static; margin-bottom: 1rem;">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">登录</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <p>还没有账户？<a href="{{ url_for('register') }}" style="color: var(--primary-color);">立即注册</a></p>
            </div>
        </div>
    </div>
</body>
</html>
